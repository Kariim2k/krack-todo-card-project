<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<article data-testid="test-todo-card" class="card">
  <input type="checkbox" id="complete" data-testid="test-todo-complete-toggle"/>
  <label for="complete">Mark as done</label>

  <h2 data-testid="test-todo-title">Watch <span class="arsenal">Arsenal</span> win the Premier League</h2>

  <p data-testid="test-todo-title">
    Since the 03/04 season, Arsenal has not won the Premier League. This season, they are in a very good position to win
    it. I want to watch them win it live at the Emirates Stadium (maybe not live).
  </p>

  <span data-testid="test-todo-priority" class="priority high">
    Very High
  </span>

  <span data-testid="test-todo-status" id="status">
    Pending
  </span>

  <time data-testid="test-todo-due-date" id="dueDate"></time>

  <time data-testid="test-todo-time-remaining" id="timeRemaining" aria-live="polite"></time>

  <ul data-testid="test-todo-tags" class="tags">
    <li data-testid="test-todo-tag-work">Sport</li>
    <li data-testid="test-todo-tag-urgent">Urgent</li>
  </ul>

  <div class="actions">
    <button data-testid="test-todo-edit-button">Edit</button>
    <button data-testid="test-todo-delete-button">Delete</button>
  </div>

</article>

<script src="./script.js"></script>
</body>

</html>
